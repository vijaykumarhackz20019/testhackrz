name: Check Classic PAT Scopes

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Display PAT scopes
        env:
          MY_PAT: ${{ secrets.MY_PAT }}
        run: |
          curl -sSI \
            -H "Authorization: token $MY_PAT" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/user \
            | grep -Ei 'x-oauth-scopes|x-accepted-oauth-scopes'
