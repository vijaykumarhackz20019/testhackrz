name: Inspect My PAT Scopes

on:
  workflow_dispatch:

jobs:
  inspect:
    runs-on: ubuntu-latest

    steps:
      - name: Show PAT scopes
        env:
          MY_PAT: ${{ secrets.MY_PAT }}
        run: |
          echo "Checking token scopes..."

          curl -sSI \
            -H "Authorization: Bearer $MY_PAT" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/user \
            | grep -Ei "x-oauth-scopes|x-accepted-oauth-scopes"
