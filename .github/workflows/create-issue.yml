name: Create Issue at 9:54 PM IST

on:
  schedule:
    - cron: '24 16 * * *'   # 9:54 PM IST
  workflow_dispatch:

permissions:
  issues: write

jobs:
  create_issue:
    runs-on: ubuntu-latest

    steps:
      - name: Create Issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const now = new Date().toISOString();

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Scheduled Issue ${now}`,
              body: `Created automatically at ${now}`
            });
