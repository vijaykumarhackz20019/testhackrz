name: Create Issue at 9:40 PM IST

on:
  schedule:
    - cron: '10 16 * * *'   # 4:10 PM UTC = 9:40 PM IST
  workflow_dispatch:

permissions:
  issues: write

jobs:
  create_issue:
    runs-on: ubuntu-latest

    steps:
      - name: Create GitHub Issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const now = new Date().toISOString();

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Scheduled Issue ${now}`,
              body: `This issue was automatically created at ${now}.`
            });
