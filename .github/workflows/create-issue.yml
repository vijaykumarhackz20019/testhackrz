name: Scheduled Issue

on:
  schedule:
    - cron: '24 20 * * *'   # 1:54 AM IST
    - cron: '30 0 * * *'    # 6:00 AM IST
    - cron: '30 4 * * *'    # 10:00 AM IST
    - cron: '30 8 * * *'    # 2:00 PM IST
    - cron: '30 12 * * *'   # 6:00 PM IST
    - cron: '30 16 * * *'   # 10:00 PM IST
  workflow_dispatch:

permissions:
  issues: write

jobs:
  create_issue:
    runs-on: ubuntu-latest

    steps:
      - name: Create Issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const now = new Date().toISOString();

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Scheduled Issue ${now}`,
              body: `Created automatically at ${now}`
            });
